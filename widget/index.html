<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sales assistant</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      }
      body {
        margin: 0;
        padding: 16px;
        max-width: 720px;
        margin-inline: auto;
      }
      h1 {
        font-size: 1.25rem;
        margin: 0 0 12px;
      }
      label {
        display: block;
        font-size: 0.85rem;
        margin: 8px 0 4px;
      }
      input,
      textarea,
      button {
        width: 100%;
        box-sizing: border-box;
        font: inherit;
      }
      textarea {
        min-height: 96px;
        resize: vertical;
      }
      button {
        margin-top: 10px;
        padding: 10px 12px;
        cursor: pointer;
      }
      #log {
        margin-top: 16px;
        padding: 12px;
        border-radius: 8px;
        border: 1px solid color-mix(in oklab, CanvasText 18%, transparent);
        white-space: pre-wrap;
        min-height: 120px;
      }
      .row {
        display: grid;
        gap: 8px;
      }
      @media (min-width: 640px) {
        .row {
          grid-template-columns: 1fr 1fr;
        }
      }
    </style>
  </head>
  <body>
    <h1>Sales assistant (demo)</h1>
    <p style="margin: 0 0 12px; font-size: 0.95rem; opacity: 0.85">
      Open this page from the API server at <code>/widget/</code> so requests go to the same origin,
      or set API base below.
    </p>
    <label for="baseUrl">API base URL</label>
    <input id="baseUrl" type="text" value="" placeholder="https://your-host.example" />
    <div class="row">
      <div>
        <label for="externalId">Customer external id</label>
        <input id="externalId" type="text" value="demo-customer-1" />
      </div>
      <div>
        <label for="name">Customer name (optional)</label>
        <input id="name" type="text" value="" placeholder="Alex" />
      </div>
    </div>
    <label for="message">Message</label>
    <textarea id="message" placeholder="What are you looking for today?"></textarea>
    <button id="send" type="button">Send</button>
    <div id="log" aria-live="polite"></div>
    <script>
      const logEl = document.getElementById("log");
      const baseUrlEl = document.getElementById("baseUrl");
      baseUrlEl.value = baseUrlEl.value || window.location.origin;

      function log(line) {
        logEl.textContent += line + "\n";
      }

      document.getElementById("send").addEventListener("click", async () => {
        const base = baseUrlEl.value.replace(/\/$/, "");
        const externalId = document.getElementById("externalId").value.trim();
        const name = document.getElementById("name").value.trim();
        const message = document.getElementById("message").value.trim();
        if (!externalId || !message) {
          log("Please provide customer external id and a message.");
          return;
        }
        logEl.textContent = "";
        log("Sending…");
        try {
          const res = await fetch(`${base}/chat`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              customer_external_id: externalId,
              customer_name: name || null,
              message,
            }),
          });
          const text = await res.text();
          if (!res.ok) {
            log(`Error (${res.status}): ${text}`);
            return;
          }
          const data = JSON.parse(text);
          log(`Assistant: ${data.reply}`);
          log(`(customer_id=${data.customer_id})`);
        } catch (e) {
          log(`Network error: ${e}`);
        }
      });
    </script>
  </body>
</html>
